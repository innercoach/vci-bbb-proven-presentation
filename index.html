<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Proven Presentation</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0d0f14;
      --panel: #171b22;
      --panel-soft: #202630;
      --text: #f4f1ea;
      --muted: #aab0bc;
      --line: rgba(255, 255, 255, 0.12);
      --accent: #d2a557;
      --accent-strong: #f0c36d;
      --shadow: 0 22px 70px rgba(0, 0, 0, 0.36);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(210, 165, 87, 0.18), transparent 34rem),
        linear-gradient(135deg, #0d0f14 0%, #111720 48%, #090a0d 100%);
    }

    main {
      width: min(1120px, calc(100% - 40px));
      min-height: 100vh;
      margin: 0 auto;
      display: grid;
      align-content: center;
      gap: 34px;
      padding: 64px 0;
    }

    .intro {
      max-width: 760px;
    }

    h1 {
      margin: 0;
      font-size: clamp(42px, 7vw, 86px);
      line-height: 0.96;
      letter-spacing: 0;
    }

    p {
      margin: 18px 0 0;
      max-width: 680px;
      color: var(--muted);
      font-size: clamp(16px, 2vw, 19px);
      line-height: 1.7;
    }

    .links {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .card {
      min-height: 220px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 28px;
      padding: 26px;
      color: inherit;
      text-decoration: none;
      background: linear-gradient(145deg, var(--panel), var(--panel-soft));
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .card:hover,
    .card:focus-visible {
      transform: translateY(-4px);
      border-color: rgba(240, 195, 109, 0.68);
      outline: none;
    }

    .card h2 {
      margin: 0;
      font-size: clamp(23px, 2.6vw, 32px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .card span {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--accent-strong);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .card span::after {
      content: "";
      width: 26px;
      height: 10px;
      border-top: 2px solid currentColor;
      border-right: 2px solid currentColor;
      transform: skewX(35deg);
    }

    .light {
      background: linear-gradient(145deg, #f4eee3, #e5d6bd);
      color: #221b14;
    }

    .light span {
      color: #7e2d38;
    }

    .dark {
      background: linear-gradient(145deg, #15110d, #2a2118);
    }

    .modern {
      background: linear-gradient(145deg, #08090d, #20223a);
    }

    footer {
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 820px) {
      main {
        width: min(100% - 28px, 560px);
        padding: 36px 0;
      }

      .links {
        grid-template-columns: 1fr;
      }

      .card {
        min-height: 170px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="intro" aria-labelledby="page-title">
      <h1 id="page-title">Proven Presentation</h1>
      <p>Select a presentation version to view. This page is the GitHub Pages entry point for the repository.</p>
    </section>

    <nav class="links" aria-label="Presentation versions">
      <a class="card light" href="Proven Presentation - Light.dc.html">
        <h2>Light Version</h2>
        <span>Open presentation</span>
      </a>
      <a class="card dark" href="Proven Presentation - Dark.dc.html">
        <h2>Dark Version</h2>
        <span>Open presentation</span>
      </a>
      <a class="card modern" href="Proven Presentation - Dark Modern.dc.html">
        <h2>Dark Modern Version</h2>
        <span>Open presentation</span>
      </a>
    </nav>

    <footer>Static HTML entry page. No build step required.</footer>
  </main>
</body>
</html>
